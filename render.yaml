services:
  - type: web
    name: merclaw
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: MERCLAW_GATEWAY_PORT
        value: "8080"
      - key: MERCLAW_STATE_DIR
        value: /data/.merclaw
      - key: MERCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: MERCLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: merclaw-data
      mountPath: /data
      sizeGB: 1
