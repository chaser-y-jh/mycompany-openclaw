name: MerClaw
options:
  bundleIdPrefix: ai.merclaw
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  MerClawKit:
    path: ../shared/MerClawKit
  Swabble:
    path: ../swabble
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    exactVersion: 147.0.0

schemes:
  MerClaw:
    shared: true
    build:
      targets:
        MerClaw: all
    test:
      targets:
        - MerClawTests
        - MerClawLogicTests
  MerClawLogicTests:
    shared: true
    build:
      targets:
        MerClawLogicTests: all
    test:
      targets:
        - MerClawLogicTests

targets:
  MerClaw:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: MerClawShareExtension
        embed: true
      - target: MerClawActivityWidget
        embed: true
      - target: MerClawWatchApp
      - package: MerClawKit
      - package: MerClawKit
        product: MerClawChatUI
      - package: MerClawKit
        product: MerClawProtocol
      - package: Swabble
        product: SwabbleKit
      - package: WebRTC
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../config/swiftformat" \
            --unexclude "$SRCROOT/Sources,$SRCROOT/ShareExtension,$SRCROOT/ActivityWidget,$SRCROOT/WatchExtension,$SRCROOT/../shared/MerClawKit,$SRCROOT/../swabble" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/MerClaw.entitlements
        CODE_SIGN_STYLE: "$(MERCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(MERCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(MERCLAW_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(MERCLAW_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          MERCLAW_PUSH_TRANSPORT: direct
          MERCLAW_PUSH_DISTRIBUTION: local
          MERCLAW_PUSH_RELAY_BASE_URL: ""
          MERCLAW_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          MERCLAW_PUSH_TRANSPORT: direct
          MERCLAW_PUSH_DISTRIBUTION: local
          MERCLAW_PUSH_RELAY_BASE_URL: ""
          MERCLAW_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: MerClaw
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.merclaw.ios
            CFBundleURLSchemes:
              - merclaw
        CFBundleShortVersionString: "$(MERCLAW_MARKETING_VERSION)"
        MerClawCanonicalVersion: "$(MERCLAW_IOS_VERSION)"
        CFBundleVersion: "$(MERCLAW_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.merclaw.ios.bgrefresh
        NSLocalNetworkUsageDescription: MerClaw discovers and connects to your MerClaw gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
          NSAllowsLocalNetworking: true
        NSBonjourServices:
          - _merclaw-gw._tcp
        NSCameraUsageDescription: MerClaw can capture photos or short video clips when requested via the gateway.
        NSCalendarsUsageDescription: MerClaw uses your calendars to show events and scheduling context when you enable calendar access.
        NSCalendarsFullAccessUsageDescription: MerClaw uses your calendars to show events and scheduling context when you enable calendar access.
        NSCalendarsWriteOnlyAccessUsageDescription: MerClaw uses your calendars to add events when you enable calendar access.
        NSContactsUsageDescription: MerClaw uses your contacts so you can search and reference people while using the assistant.
        NSLocationWhenInUseUsageDescription: MerClaw uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: MerClaw can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: MerClaw uses the microphone for realtime chat, voice wake, and push-to-talk.
        NSMotionUsageDescription: MerClaw may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: MerClaw needs photo library access when you choose existing photos to share with your assistant.
        NSRemindersFullAccessUsageDescription: MerClaw uses your reminders to list, add, and complete tasks when you enable reminders access.
        NSSpeechRecognitionUsageDescription: MerClaw uses on-device speech recognition for talk mode and voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        MerClawPushTransport: "$(MERCLAW_PUSH_TRANSPORT)"
        MerClawPushDistribution: "$(MERCLAW_PUSH_DISTRIBUTION)"
        MerClawPushRelayBaseURL: "$(MERCLAW_PUSH_RELAY_BASE_URL)"
        MerClawPushAPNsEnvironment: "$(MERCLAW_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  MerClawShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: MerClawKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(MERCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(MERCLAW_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(MERCLAW_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(MERCLAW_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: MerClaw Share
        CFBundleShortVersionString: "$(MERCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(MERCLAW_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  MerClawActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/MerClawActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(MERCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(MERCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(MERCLAW_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: MerClaw Activity
        CFBundleShortVersionString: "$(MERCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(MERCLAW_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  MerClawWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: MerClawWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(MERCLAW_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(MERCLAW_CODE_SIGN_STYLE)"
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(MERCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(MERCLAW_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(MERCLAW_WATCH_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(MERCLAW_WATCH_APP_PROFILE)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: MerClaw
        CFBundleShortVersionString: "$(MERCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(MERCLAW_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(MERCLAW_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  MerClawWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(MERCLAW_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(MERCLAW_CODE_SIGN_STYLE)"
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(MERCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(MERCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(MERCLAW_WATCH_EXTENSION_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(MERCLAW_WATCH_EXTENSION_PROFILE)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: MerClaw
        CFBundleShortVersionString: "$(MERCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(MERCLAW_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(MERCLAW_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  MerClawTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: MerClaw
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(MERCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(MERCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.merclaw.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MerClaw.app/MerClaw"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: MerClawTests
        CFBundleShortVersionString: "$(MERCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(MERCLAW_BUILD_VERSION)"

  MerClawLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: MerClawKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(MERCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(MERCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.merclaw.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_EMIT_CONST_VALUE_PROTOCOLS: ""
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: MerClawLogicTests
        CFBundleShortVersionString: "$(MERCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(MERCLAW_BUILD_VERSION)"
